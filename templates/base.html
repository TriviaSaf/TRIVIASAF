<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Trivia SAF{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/saf.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<!-- ===================== TOOLBAR ===================== -->
<header class="toolbar">
  <!-- Row 1: White bar -->
  <div class="toolbar-top">
    <div class="toolbar-brand">
      <button class="toolbar-menu-btn" aria-label="Menu">&#9776;</button>
      <div class="toolbar-brand-text">
        <span class="toolbar-title">Trivia SAF</span>
        <span class="toolbar-user-sub" id="toolbar-user-name"></span>
      </div>
    </div>
    <div class="toolbar-user">
      <img src="{{ url_for('static', filename='logo.png') }}" class="toolbar-logo" alt="Trivia SAF">
    </div>
  </div>
  <!-- Row 2: Nav tabs (navy) -->
  <nav class="toolbar-nav" id="toolbar-nav">
    {% block toolbar_nav %}{% endblock %}
  </nav>
</header>

<!-- ===================== SIDEBAR ===================== -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar" aria-label="Menu lateral">
  <div class="sidebar-header">
    <img src="{{ url_for('static', filename='logo.png') }}" class="sidebar-logo" alt="Trivia SAF">
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="sidebar-dev">
      <span class="sidebar-dev-label">Trocar Perfil</span>
      <select id="dev-perfil-select" class="sidebar-dev-select">
        <option value="">— selecione um perfil —</option>
        <option value="SOLICITANTE">Solicitante</option>
        <option value="CCM">CCM</option>
        <option value="ADMIN">Administrador</option>
      </select>
    </div>
    <button class="sidebar-logout" id="sidebar-logout">&#x2192; Sair</button>
  </div>
</aside>

<!-- ===================== CONTENT ===================== -->
<main>
  {% block content %}{% endblock %}
</main>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Global Confirm Modal -->
<div class="modal-backdrop" id="global-confirm-modal">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <span class="modal-title" id="global-confirm-title">Confirmar ação</span>
      <button class="modal-close" data-dismiss-confirm aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="global-confirm-message" style="font-size:.9rem;color:var(--text);"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-dismiss-confirm>Cancelar</button>
      <button class="btn btn-primary" id="global-confirm-btn">Confirmar</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/saf.js') }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    setupToolbar();
    {% block init_script %}{% endblock %}
  });
</script>
{% block page_script %}{% endblock %}
</body>
</html>
