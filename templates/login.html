<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – SAF Sistema de Abertura de Falhas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/saf.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <!-- Logo -->
    <img src="{{ url_for('static', filename='logo.png') }}"
         class="login-logo" alt="Trivia SAF">

    <p class="login-title">Acesso ao Sistema</p>
    <p class="login-subtitle">Entre com suas credenciais corporativas</p>

    <!-- Error alert (hidden initially) -->
    <div id="login-error" class="alert alert-danger hidden" role="alert">
      <span class="alert-icon">⚠️</span>
      <span id="login-error-msg">Credenciais inválidas.</span>
    </div>

    <!-- Form -->
    <form id="login-form" novalidate>
      <div class="form-group mb-3">
        <label class="form-label" for="email">
          E-mail corporativo <span class="required">*</span>
        </label>
        <input type="email" id="email" name="email"
               class="form-control" placeholder="seu@email.com"
               required autocomplete="username">
        <span class="form-error">Informe um e-mail válido.</span>
      </div>

      <div class="form-group mb-4">
        <label class="form-label" for="senha">
          Senha <span class="required">*</span>
        </label>
        <div style="position:relative;">
          <input type="password" id="senha" name="senha"
                 class="form-control" placeholder="••••••••"
                 required autocomplete="current-password"
                 style="padding-right:2.5rem;">
          <button type="button" id="toggle-senha"
                  style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);font-size:1rem;padding:2px 4px;"
                  aria-label="Mostrar/ocultar senha">👁</button>
        </div>
        <span class="form-error">Informe a senha.</span>
      </div>

      <button type="submit" id="btn-login" class="btn btn-primary btn-lg btn-block">
        Entrar
      </button>
    </form>

    <p class="login-footer">
      Problemas de acesso? Contate o suporte de TI.<br>
      <span style="color:var(--text-light);">SAF v1.0 &mdash; Trivia &copy; 2025</span>
    </p>
  </div>
</div>

<div id="toast-container"></div>
<script src="{{ url_for('static', filename='js/saf.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  // Se já estiver logado, redirecionar
  Auth.redirectIfLoggedIn();

  const form    = document.getElementById('login-form');
  const btnLogin = document.getElementById('btn-login');
  const errBox  = document.getElementById('login-error');
  const errMsg  = document.getElementById('login-error-msg');

  // Toggle password visibility
  document.getElementById('toggle-senha').addEventListener('click', function () {
    const input = document.getElementById('senha');
    input.type = input.type === 'password' ? 'text' : 'password';
  });

  function showError(msg) {
    errMsg.textContent = msg;
    errBox.classList.remove('hidden');
  }
  function hideError() {
    errBox.classList.add('hidden');
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    hideError();

    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    if (!email || !senha) {
      validateForm(form);
      return;
    }

    setLoading(btnLogin, true, 'Entrando...');

    const res = await API.login(email, senha);

    setLoading(btnLogin, false, 'Entrar');

    if (!res.ok) {
      showError(res.data.erro || 'Credenciais inválidas. Verifique e tente novamente.');
      return;
    }

    // Salva sessão
    Auth.setUser({
      id:     res.data.id,
      nome:   res.data.nome,
      perfil: res.data.perfil,
    });

    // Redirecionar por perfil
    const dest = {
      SOLICITANTE: '/minhas-safs',
      CCM:         '/fila-ccm',
      ADMIN:       '/admin',
    };
    window.location.href = dest[res.data.perfil] || '/minhas-safs';
  });

  // Limpar erro ao digitar
  ['email','senha'].forEach(id => {
    document.getElementById(id).addEventListener('input', hideError);
  });
});
</script>
</body>
</html>
