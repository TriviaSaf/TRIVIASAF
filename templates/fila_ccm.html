{% extends "base.html" %}

{% block title %}Fila CCM{% endblock %}

{% block toolbar_nav %}
<a href="/filaccm" class="nav-tab active">Fila de Análise</a>
{% endblock %}

{% block content %}
<div class="page-wrapper ccm-wrapper">

  <div class="page-header">
    <div>
      <p class="page-title">Fila de Análise do CCM-E</p>
    </div>
    <button class="btn btn-outline" id="btn-refresh">&#8635; Atualizar</button>
    <span id="last-sync" style="font-size:.75rem;color:var(--text-muted);align-self:center;"></span>
  </div>

  <!-- Filter tabs -->
  <div class="filter-bar">
    <button class="filter-tab active" data-filter="PENDENTES">Pendentes</button>
    <button class="filter-tab" data-filter="TODAS">Todas</button>
    <button class="filter-tab" data-filter="APROVADA">Aprovadas</button>
    <button class="filter-tab" data-filter="DUPLICADA">Duplicadas</button>
    <button class="filter-tab" data-filter="CANCELADA">Canceladas</button>
  </div>

  <!-- Equipment filter -->
  <div class="equip-filter-bar ccm-advanced-filters">
    <div class="ccm-filter-item">
      <label class="equip-filter-label" for="line-filter">Linha</label>
      <select id="line-filter" class="equip-filter-select">
        <option value="">Todas as linhas</option>
      </select>
    </div>

    <div class="ccm-filter-item">
      <label class="equip-filter-label" for="station-filter">Estação</label>
      <select id="station-filter" class="equip-filter-select">
        <option value="">Todas as estações</option>
      </select>
    </div>

    <div class="ccm-filter-item">
      <label class="equip-filter-label" for="date-from-filter">Data notificacao (de)</label>
      <input id="date-from-filter" class="equip-filter-select" type="date">
    </div>

    <div class="ccm-filter-item">
      <label class="equip-filter-label" for="date-to-filter">Data notificacao (ate)</label>
      <input id="date-to-filter" class="equip-filter-select" type="date">
    </div>

    <button class="btn btn-ghost btn-sm" id="btn-clear-ccm-filters" type="button">Limpar filtros</button>
  </div>

  <!-- Queue -->
  <div id="ccm-queue">
    <div class="spinner-center"><div class="spinner"></div></div>
  </div>

</div>

<style>
/* ---- CCM Queue: grouped card layout ---- */
.ccm-group { margin-bottom: 1.75rem; }

.ccm-group-header {
  display: flex;
  align-items: center;
  gap: .65rem;
  padding: .6rem 1rem;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius) var(--radius) 0 0;
  font-weight: 700;
  font-size: .88rem;
}
.ccm-group-header-left {
  display: flex;
  align-items: center;
  gap: .65rem;
  min-width: 0;
}
.ccm-group-header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
}
.ccm-dup-header-btn.active {
  filter: saturate(1.2);
  box-shadow: 0 0 0 2px rgba(255,255,255,.28) inset;
}
.ccm-dup-confirm-btn {
  margin-left: .45rem;
  background: #f8fafc;
  color: #0f172a;
  border-color: #e2e8f0;
}
.ccm-dup-confirm-btn:hover {
  background: #ffffff;
  color: #0f172a;
  border-color: #ffffff;
}
.ccm-dup-confirm-btn:disabled {
  opacity: .55;
  background: rgba(248,250,252,.5);
  color: rgba(15,23,42,.85);
  border-color: rgba(226,232,240,.7);
}
.ccm-gcount {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 20px;
  padding: 0 7px;
  background: rgba(255,255,255,.18);
  border-radius: 99px;
  font-size: .72rem;
  font-weight: 700;
}
.ccm-gcount.pend { background: rgba(232,92,17,.85); }

.ccm-card {
  display: flex;
  align-items: flex-start;
  gap: 1.25rem;
  padding: 1.05rem 1.3rem;
  border: 1px solid var(--border);
  border-top: none;
  background: var(--bg);
  transition: background var(--trans);
}
.ccm-card:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.ccm-card + .ccm-card { border-top: 1px solid var(--border-lt); }
.ccm-card:hover { background: var(--surface); }

/* Left: ticket + badges */
.ccm-card-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: .35rem;
  width: 190px;
  flex-shrink: 0;
  padding-top: 2px;
}
/* Photo thumbnail */
.ccm-card-photo {
  width: 90px;
  flex-shrink: 0;
  align-self: flex-start;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.ccm-photo-img {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: block;
  transition: opacity var(--trans);
  cursor: zoom-in;
}
.ccm-photo-img:hover { opacity: .82; }

/* Lightbox */
.ccm-lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,.88);
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
.ccm-lightbox.open { display: flex; }
.ccm-lightbox img {
  max-width: min(92vw, 1200px);
  max-height: 90dvh;
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
  object-fit: contain;
  cursor: default;
}
.ccm-lightbox-close {
  position: absolute;
  top: 1rem;
  right: 1.25rem;
  background: none;
  border: none;
  color: #fff;
  font-size: 2rem;
  cursor: pointer;
  line-height: 1;
  opacity: .8;
}
.ccm-lightbox-close:hover { opacity: 1; }
.ccm-photo-placeholder {
  width: 90px;
  height: 90px;
  border-radius: var(--radius);
  border: 1px dashed var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 1.4rem;
  color: var(--text-light);
  text-align: center;
}
.ccm-photo-placeholder span { font-size: .68rem; color: var(--text-light); }
/* Notificador name + area */
.ccm-notificador {
  display: flex;
  flex-direction: column;
  gap: 1px;
  margin-top: .4rem;
}
.ccm-notif-nome {
  font-size: .8rem;
  font-weight: 600;
  color: var(--text);
}
.ccm-notif-area {
  font-size: .74rem;
  color: var(--text-muted);
  padding-left: 1.3em;
}
.ccm-notif-data {
  font-size: .74rem;
  color: var(--text-muted);
  padding-left: 1.3em;
}
.ccm-ticket {
  font-family: 'Courier New', monospace;
  font-size: 1rem;
  font-weight: 800;
  color: var(--primary);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 8px;
  white-space: nowrap;
}

/* Center: content */
.ccm-card-content {
  flex: 1;
  min-width: 0;
}
.ccm-title {
  font-size: .95rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .2rem;
}
.ccm-desc {
  font-size: .84rem;
  color: var(--text-muted);
  line-height: 1.55;
  margin-bottom: .5rem;
  white-space: pre-wrap;
  word-break: break-word;
}
.ccm-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem .75rem;
  font-size: .78rem;
  color: var(--text-muted);
  align-items: center;
}
.ccm-criticidade {
  margin: 0;
  padding: .5rem .55rem;
  border: 1px solid var(--border-lt);
  border-radius: var(--radius);
  background: var(--surface);
}
.ccm-criticidade.is-locked {
  opacity: .58;
  filter: grayscale(.25);
  background: #f3f4f6;
}
.ccm-criticidade-title {
  font-size: .74rem;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: .35rem;
}
.ccm-criticidade-options {
  display: flex;
  flex-direction: column;
  gap: .3rem;
}
.ccm-criticidade-option {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  font-size: .76rem;
  color: var(--text);
}
.ccm-criticidade-option input {
  margin: 0;
  accent-color: var(--primary);
}
.ccm-motivo-box {
  font-size: .8rem;
  color: #92400e;
  background: #fffbeb;
  border-left: 3px solid var(--warning);
  padding: .35rem .6rem;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin-top: .5rem;
  font-style: italic;
}

/* Right: actions */
.ccm-card-actions {
  min-width: 360px;
  flex-shrink: 0;
}
.ccm-card-actions-row {
  display: flex;
  align-items: flex-start;
  gap: .75rem;
}
.ccm-criticidade-col {
  flex: 0 0 210px;
}
.ccm-action-buttons {
  flex: 1;
  min-width: 130px;
  display: flex;
  flex-direction: column;
  gap: .55rem;
}
.ccm-action-buttons.is-locked {
  opacity: .62;
}
.ccm-lock-note {
  font-size: .74rem;
  font-weight: 700;
  color: #6b7280;
  background: #f3f4f6;
  border: 1px solid #d1d5db;
  border-radius: var(--radius);
  padding: .25rem .45rem;
}
.ccm-recusa-form {
  display: flex;
  flex-direction: column;
  gap: .4rem;
  min-width: 200px;
}
.ccm-recusa-form textarea {
  width: 100%;
  min-height: 60px;
  font-size: .82rem;
  padding: .35rem .6rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  resize: vertical;
  font-family: inherit;
  color: var(--text);
  outline: none;
  background: var(--bg);
}
.ccm-recusa-form textarea:focus {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px rgba(220,38,38,.1);
}
.ccm-dup-check-wrap {
  display: flex;
  align-items: center;
  gap: .5rem;
  margin-top: .2rem;
  padding: .15rem 0;
  cursor: pointer;
  color: var(--text-muted);
  font-size: .8rem;
  font-weight: 600;
}
.ccm-dup-check-wrap input {
  width: 1.05rem;
  height: 1.05rem;
  accent-color: var(--primary);
  cursor: pointer;
}
.ccm-btn-danger-outline {
  background: transparent;
  color: var(--danger);
  border-color: var(--danger);
}
.ccm-btn-danger-outline:hover {
  background: rgba(220, 38, 38, .08);
  color: var(--danger);
  border-color: var(--danger);
}

/* SAP badge variants */
.badge-sap-sim {
  background: #f0fdf4;
  color: #15803d;
  border: 1px solid #bbf7d0;
  font-size: .72rem;
}
.badge-sap-nao {
  background: var(--surface);
  color: var(--text-light);
  border: 1px solid var(--border);
  font-size: .72rem;
}
.badge-sap-sim.clickable,
.badge-sap-nao.clickable {
  cursor: pointer;
  user-select: none;
  transition: opacity var(--trans);
}
.badge-sap-sim.clickable:hover,
.badge-sap-nao.clickable:hover { opacity: .72; }

/* Equipment filter bar */
.equip-filter-bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: .65rem;
  margin-top: .5rem;
  margin-bottom: .25rem;
}
.ccm-filter-item {
  display: flex;
  align-items: center;
  gap: .4rem;
}
.ccm-advanced-filters {
  margin-bottom: .5rem;
}
.equip-filter-label {
  font-size: .82rem;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
}
.equip-filter-select {
  padding: .3rem .65rem;
  font-size: .84rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  outline: none;
  min-width: 220px;
}
.equip-filter-select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(var(--primary-rgb),.12);
}

@media (max-width: 900px) {
  .ccm-card {
    flex-wrap: wrap;
    gap: .9rem;
  }
  .ccm-card-meta {
    width: auto;
    min-width: 150px;
  }
  .ccm-card-actions {
    min-width: 100%;
    width: 100%;
  }
  .ccm-card-actions-row {
    flex-direction: column;
    gap: .6rem;
  }
  .ccm-criticidade-col {
    flex: 1 1 auto;
    width: 100%;
  }
}

@media (max-width: 640px) {
  .ccm-group-header {
    flex-wrap: wrap;
    row-gap: .5rem;
    padding: .55rem .75rem;
  }
  .ccm-group-header-left {
    width: 100%;
    flex-wrap: wrap;
    gap: .45rem;
  }
  .ccm-group-header-right {
    margin-left: 0;
    width: 100%;
    justify-content: flex-end;
  }
  .ccm-dup-confirm-btn {
    margin-left: .35rem;
  }
  .ccm-card {
    padding: .85rem .8rem;
    gap: .75rem;
  }
  .ccm-card-meta {
    min-width: 0;
    width: 100%;
    gap: .3rem;
  }
  .ccm-card-photo {
    width: 76px;
  }
  .ccm-photo-img,
  .ccm-photo-placeholder {
    width: 76px;
    height: 76px;
  }
  .ccm-card-content {
    width: calc(100% - 88px);
  }
  .ccm-title {
    font-size: .9rem;
  }
  .ccm-desc {
    font-size: .8rem;
  }
  .ccm-action-buttons,
  .ccm-recusa-form {
    min-width: 0;
  }
}
</style>
{% endblock %}

{% block page_script %}
<script>
(function () {
  let allSafs      = [];
  let activeFilter = 'PENDENTES';
  let activeLine   = '';
  let activeStation = '';
  let activeDateFrom = '';
  let activeDateTo   = '';
  let estacoesCache = [];
  let estacaoById = new Map();
  let estacoesPorLinha = new Map();
  const duplicateModeGroups = new Set();
  const duplicateSelections = new Map();

  function toDateKey(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return '';
    return d.toISOString().slice(0, 10);
  }

  function norm(v) {
    return String(v || '').trim().toLowerCase();
  }

  function parseLinha(item) {
    const est = estacaoById.get(String(item.local_instalacao_id || '').trim());
    if (est?.linha) return String(est.linha).trim();

    const local = String(item.local_instalacao || '');
    const lid = String(item.local_instalacao_id || '');
    const titulo = String(item.titulo_falha || '');
    const composed = `${local} ${lid} ${titulo}`;

    const mLinha = composed.match(/linha\s*(\d{1,2})/i);
    if (mLinha && mLinha[1]) return mLinha[1];

    const mTv = composed.match(/\bTV\s*([0-9]{2})\b/i);
    if (mTv && mTv[1]) return mTv[1];

    return '';
  }

  function parseEstacao(item) {
    const est = estacaoById.get(String(item.local_instalacao_id || '').trim());
    if (est?.estacao) return String(est.estacao).trim();

    const local = String(item.local_instalacao || '').trim();
    if (!local) return '';

    const m = local.match(/estac[aã]o\s+([^\-()]+)/i);
    if (m && m[1]) return String(m[1]).trim();

    return local;
  }

  function enrichSafForFilters(item) {
    const linha = parseLinha(item);
    const estacao = parseEstacao(item);
    const dataNotificacao = toDateKey(item.criado_em);
    return {
      ...item,
      _linha: linha,
      _estacao: estacao,
      _data_notificacao: dataNotificacao,
    };
  }

  function rebuildEstacaoLookup() {
    estacaoById = new Map();
    estacoesPorLinha = new Map();
    (estacoesCache || []).forEach(e => {
      const id = String(e.id || '').trim();
      const linha = String(e.linha || '').trim();
      const estacao = String(e.estacao || '').trim();
      if (!id) return;
      estacaoById.set(id, { linha, estacao });
      if (!linha || !estacao) return;
      if (!estacoesPorLinha.has(linha)) estacoesPorLinha.set(linha, new Set());
      estacoesPorLinha.get(linha).add(estacao);
    });
  }

  async function carregarCatalogoEstacoes() {
    const res = await API.estacoes();
    if (!res.ok) {
      estacoesCache = [];
      rebuildEstacaoLookup();
      return;
    }
    estacoesCache = res.data?.estacoes || [];
    rebuildEstacaoLookup();
  }

  // ───────── Stats ─────────
  function updateStats() {
    const c = { ABERTA: 0, APROVADA: 0, DEVOLVIDA: 0, CANCELADA: 0, DUPLICADA: 0 };
    allSafs.forEach(s => { if (c[s.status] !== undefined) c[s.status]++; });
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    set('s-pendentes',  c.ABERTA);
    set('s-aprovadas',  c.APROVADA);
    set('s-devolvidas', c.DEVOLVIDA);
    set('s-canceladas', c.CANCELADA);
    set('s-total',      allSafs.length);
    set('ccm-subtitle',
      c.ABERTA > 0
        ? `${c.ABERTA} solicitação(ões) aguardando avaliação`
        : 'Nenhuma solicitação pendente');
  }

  // ───────── Filter ─────────
  function getFiltered() {
    let items = allSafs;
    if (activeFilter === 'PENDENTES')  items = items.filter(s => s.status === 'ABERTA');
    else if (activeFilter === 'APROVADA')  items = items.filter(s => s.status === 'APROVADA');
    else if (activeFilter === 'DUPLICADA') items = items.filter(s => s.status === 'DUPLICADA');
    else if (activeFilter === 'CANCELADA') items = items.filter(s => s.status === 'CANCELADA');
    // TODAS: mostra tudo
    if (activeLine) items = items.filter(s => String(s._linha || '') === activeLine);
    if (activeStation) items = items.filter(s => norm(s._estacao) === norm(activeStation));
    if (activeDateFrom) items = items.filter(s => {
      const d = String(s._data_notificacao || '');
      return d && d >= activeDateFrom;
    });
    if (activeDateTo) items = items.filter(s => {
      const d = String(s._data_notificacao || '');
      return d && d <= activeDateTo;
    });
    return items;
  }

  function populateLineFilter() {
    const sel = document.getElementById('line-filter');
    if (!sel) return;

    const linhasData = [...new Set(allSafs.map(s => String(s._linha || '').trim()).filter(Boolean))];
    const linhasCatalogo = [...estacoesPorLinha.keys()];
    const linhas = [...new Set([...linhasCatalogo, ...linhasData])]
      .sort((a, b) => a.localeCompare(b, 'pt-BR', { numeric: true }));

    sel.innerHTML = '<option value="">Todas as linhas</option>' +
      linhas.map(l => `<option value="${l}">${l}</option>`).join('');

    if (linhas.includes(activeLine)) sel.value = activeLine;
    else activeLine = '';
  }

  function populateStationFilter() {
    const sel = document.getElementById('station-filter');
    if (!sel) return;

    const fromData = allSafs
      .filter(s => !activeLine || String(s._linha || '') === activeLine)
      .map(s => String(s._estacao || '').trim())
      .filter(Boolean);

    const fromCatalogo = activeLine && estacoesPorLinha.has(activeLine)
      ? [...estacoesPorLinha.get(activeLine)]
      : [];

    const estacoes = [...new Set([...fromCatalogo, ...fromData])]
      .sort((a, b) => a.localeCompare(b, 'pt-BR'));

    sel.innerHTML = '<option value="">Todas as estações</option>' +
      estacoes.map(e => `<option value="${escHtml(e)}">${escHtml(e)}</option>`).join('');

    if (estacoes.some(e => norm(e) === norm(activeStation))) {
      const matched = estacoes.find(e => norm(e) === norm(activeStation));
      sel.value = matched || '';
      activeStation = matched || '';
    } else {
      activeStation = '';
      sel.value = '';
    }
  }

  function syncFilterControls() {
    const dateFromEl = document.getElementById('date-from-filter');
    const dateToEl = document.getElementById('date-to-filter');
    if (dateFromEl) dateFromEl.value = activeDateFrom;
    if (dateToEl) dateToEl.value = activeDateTo;
    populateLineFilter();
    populateStationFilter();
  }

  function escHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatDescricaoComOcorrencia(texto) {
    const escaped = escHtml(texto);
    return escaped.replace(
      /(Ocorr(?:e|ê)ncia com cliente:[^\n\r]*)/gi,
      '<strong style="color:#dc2626;font-weight:800;">$1</strong>'
    );
  }

  // ───────── Render ─────────
  function renderQueue() {
    const container = document.getElementById('ccm-queue');
    const items = getFiltered();

    if (items.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">&#128235;</div>
          <p class="empty-state-title">Nenhuma solicitação</p>
          <p class="empty-state-text">Não há itens para o filtro selecionado.</p>
        </div>`;
      return;
    }

    // Group by equipment (fallback: titulo_falha)
    const groups = new Map();
    items.forEach(item => {
      const key = item.equipamento || item.titulo_falha || 'Sem Equipamento';
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(item);
    });

    // Sort: groups with most pending first
    const sorted = [...groups.entries()].sort(([, a], [, b]) => {
      const pa = a.filter(x => x.status === 'ABERTA').length;
      const pb = b.filter(x => x.status === 'ABERTA').length;
      return pb - pa;
    });

    container.innerHTML = sorted.map(([equip, list]) => renderGroup(equip, list)).join('');

    container.querySelectorAll('.js-dup-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const equip = decodeURIComponent(btn.dataset.equip || '');
        toggleDuplicadoGroup(equip);
      });
    });

    container.querySelectorAll('.js-dup-confirm').forEach(btn => {
      btn.addEventListener('click', () => {
        const equip = decodeURIComponent(btn.dataset.equip || '');
        confirmarDuplicadasGrupo(equip);
      });
    });
  }

  function getSelectionSet(equip) {
    if (!duplicateSelections.has(equip)) duplicateSelections.set(equip, new Set());
    return duplicateSelections.get(equip);
  }

  function renderGroup(equip, items) {
    const pend = items.filter(x => x.status === 'ABERTA').length;
    const selectedCount = items.filter(x => x.status === 'ABERTA' && getSelectionSet(equip).has(x.id)).length;
    const dupMode = duplicateModeGroups.has(equip);
    const pendBadge = pend > 0
      ? `<span class="ccm-gcount pend">${pend} pendente${pend > 1 ? 's' : ''}</span>`
      : '';
    const duplicadoBtn = pend > 0
      ? `<button class="btn btn-warning btn-sm ccm-dup-header-btn ${dupMode ? 'active' : ''} js-dup-toggle" data-equip="${encodeURIComponent(equip)}">Duplicado</button>`
      : '';
    const confirmarSelecaoBtn = dupMode
      ? `<button class="btn btn-outline btn-sm ccm-dup-confirm-btn js-dup-confirm" data-equip="${encodeURIComponent(equip)}" ${selectedCount === 0 ? 'disabled' : ''}>Confirmar seleção${selectedCount > 0 ? ` (${selectedCount})` : ''}</button>`
      : '';
    return `
      <div class="ccm-group">
        <div class="ccm-group-header">
          <div class="ccm-group-header-left">
            <span>&#9874; ${equip}</span>
            ${pendBadge}
            <span class="ccm-gcount">${items.length} total</span>
          </div>
          <div class="ccm-group-header-right">${duplicadoBtn}${confirmarSelecaoBtn}</div>
        </div>
        ${items.map(item => renderCard(item, equip)).join('')}
      </div>`;
  }

  function renderCard(item, equip) {
    const saf    = item;
    const integ  = item.saf_integracao_sap || {};
    const id     = item.id;
    const status = item.status;
    const isEditable = status === 'ABERTA';
    const ticket = saf.ticket_saf ? `#${String(saf.ticket_saf).padStart(7, '0')}` : `#${id.substring(0, 7).toUpperCase()}`;
    let inicioFalhaTxt = '';
    if (saf.data_inicio_avaria) {
      const [ano, mes, dia] = saf.data_inicio_avaria.split('-');
      const hora = saf.hora_inicio_avaria ? saf.hora_inicio_avaria.substring(0,5) : '';
      inicioFalhaTxt = hora ? `${dia}/${mes}/${ano} ${hora}` : `${dia}/${mes}/${ano}`;
    }

    const notificadorHtml = saf.notificador_nome
      ? `<div class="ccm-notificador"><span class="ccm-notif-nome">&#128100; ${saf.notificador_nome}</span>${saf.notificador_area ? `<span class="ccm-notif-area">${saf.notificador_area}</span>` : ''}${inicioFalhaTxt ? `<span class="ccm-notif-data">${inicioFalhaTxt}</span>` : ''}</div>`
      : '';
    const prio = String(saf.prioridade || '').toUpperCase();
    const criticidade = prio === 'BAIXA' || prio === '1' ? 1
      : prio === 'MEDIA' || prio === 'MÉDIA' || prio === '2' ? 2
      : prio === 'ALTA' || prio === '3' ? 3
      : prio === 'CRITICA' || prio === 'CRÍTICA' || prio === '4' ? 4
      : null;
    const criticidadeHtml = `
      <div class="ccm-criticidade ${isEditable ? '' : 'is-locked'}">
        <div class="ccm-criticidade-title">Criticidade </div>
        <div class="ccm-criticidade-options">
          <label class="ccm-criticidade-option"><input type="radio" name="crit-${id}" value="1" ${criticidade === 1 ? 'checked' : ''} ${isEditable ? `onchange="window._ccmSetPrioridade('${id}', 1)"` : 'disabled'}> Baixa (1)</label>
          <label class="ccm-criticidade-option"><input type="radio" name="crit-${id}" value="2" ${criticidade === 2 ? 'checked' : ''} ${isEditable ? `onchange="window._ccmSetPrioridade('${id}', 2)"` : 'disabled'}> Média (2)</label>
          <label class="ccm-criticidade-option"><input type="radio" name="crit-${id}" value="3" ${criticidade === 3 ? 'checked' : ''} ${isEditable ? `onchange="window._ccmSetPrioridade('${id}', 3)"` : 'disabled'}> Alta (3)</label>
          <label class="ccm-criticidade-option"><input type="radio" name="crit-${id}" value="4" ${criticidade === 4 ? 'checked' : ''} ${isEditable ? `onchange="window._ccmSetPrioridade('${id}', 4)"` : 'disabled'}> Muito alta (4)</label>
        </div>
      </div>`;

    // QMNUM badge — aparece após aprovação
    let qmnumBadge = '';
    if (integ.qmnum && integ.status_integracao === 'SUCESSO') {
      const tipoLabel = integ.tipo_nota || '';
      qmnumBadge = `<span class="badge" style="background:#1e3a5f;color:#fff;font-family:monospace;letter-spacing:.04em;" title="Nota SAP criada com sucesso">${tipoLabel} ${integ.qmnum}</span>`;
    } else if (integ.status_integracao === 'ERRO') {
      qmnumBadge = `<span class="badge" style="background:#7f1d1d;color:#fff;" title="Erro na integração SAP: ${integ.mensagem_erro || ''}">&#9888; SAP ERRO</span>`;
    } else if (status === 'APROVADA' && !integ.qmnum) {
      qmnumBadge = `<span class="badge" style="background:#78350f;color:#fff;" title="Aguardando criação da nota no SAP">&#8987; SAP PENDENTE</span>`;
    }

    // Meta info row
    const metaParts = [];
    if (saf.local_instalacao) metaParts.push(`${saf.local_instalacao}`);
    if (item.data_avaliacao) metaParts.push(`&#128197; ${Fmt.datetime(item.data_avaliacao)}`);

    // Action buttons
    let actionsHtml;
    if (status === 'ABERTA') {
      const checked = getSelectionSet(equip).has(id) ? 'checked' : '';
      const dupCheck = duplicateModeGroups.has(equip)
        ? `<label class="ccm-dup-check-wrap"><input type="checkbox" id="dup-check-${id}" ${checked} onchange="window._ccmToggleDuplicadaItem('${id}', '${encodeURIComponent(equip)}', this.checked)"> Selecionar para duplicada</label>`
        : '';
      actionsHtml = `
        <button class="btn btn-success btn-sm" onclick="window._ccmMostrarAceite('${id}')">&#10003; Aceitar</button>
        <button class="btn btn-sm ccm-btn-danger-outline" onclick="window._ccmMostrarRecusa('${id}')">&#10007; Recusar</button>
        ${dupCheck}`;
    } else if (status === 'APROVADA') {
      actionsHtml = `<span style="font-size:.8rem;color:var(--green);font-weight:600;">&#10004; Aprovada</span>`;
    } else if (status === 'DEVOLVIDA') {
      actionsHtml = `<span style="font-size:.8rem;color:var(--warning);font-weight:600;">&#8617; Devolvida</span>`;
    } else if (status === 'CANCELADA') {
      actionsHtml = `<span style="font-size:.8rem;color:var(--text-muted);font-weight:600;">&#10006; Cancelada</span>`;
    } else if (status === 'DUPLICADA') {
      const refNota = item.qmnum_duplicata ? ` — Nota ${item.qmnum_duplicata}` : '';
      actionsHtml = `<span style="font-size:.8rem;color:#6b7280;font-weight:600;">&#9632; Duplicata${refNota}</span>`;
    } else {
      actionsHtml = Fmt.statusBadge(status);
    }

    // Motivo devolução / cancelamento
    const motivoHtml = (status === 'DEVOLVIDA' && item.motivo_devolucao)
      ? `<div class="ccm-motivo-box">&#8617; <em>Motivo:</em> ${item.motivo_devolucao}</div>`
      : (status === 'CANCELADA' && item.motivo_cancelamento)
      ? `<div class="ccm-motivo-box" style="color:#7f1d1d;background:#fff1f2;border-color:#f87171;">&#10006; <em>Cancelamento:</em> ${item.motivo_cancelamento}</div>`
      : '';

    return `
      <div class="ccm-card" id="card-${id}">
        <div class="ccm-card-meta">
          <span class="ccm-ticket">${ticket}</span>
          ${notificadorHtml}
          ${qmnumBadge}
        </div>
        <div class="ccm-card-photo">
          ${saf.anexo_evidencia_url
            ? `<img src="${saf.anexo_evidencia_url}" class="ccm-photo-img" alt="Evid\xeancia" loading="lazy"
                 onclick="window._ccmOpenLightbox('${saf.anexo_evidencia_url}')" title="Ampliar foto">`
            : `<div class="ccm-photo-placeholder">&#128247;<br><span>Sem foto</span></div>`
          }
          ${saf.foto_lat && saf.foto_lng
            ? `<a href="https://www.google.com/maps?q=${saf.foto_lat},${saf.foto_lng}&z=17"
                  target="_blank" rel="noopener noreferrer"
                  style="display:flex;align-items:center;justify-content:center;gap:3px;
                         font-size:.69rem;font-weight:600;color:var(--primary);
                         text-decoration:none;margin-top:5px;white-space:nowrap;"
                  title="Ver localização da foto no Google Maps">
                &#127759; Ver no Mapa
              </a>`
            : ''
          }
        </div>
        <div class="ccm-card-content">
          <div class="ccm-title">${saf.titulo_falha || '—'}</div>
          ${saf.descricao_longa ? `<div class="ccm-desc">${formatDescricaoComOcorrencia(saf.descricao_longa)}</div>` : ''}
          <div class="ccm-meta-row">
            ${metaParts.map(p => `<span>${p}</span>`).join('')}
          </div>
          ${motivoHtml}
        </div>
        <div class="ccm-card-actions">
          <div class="ccm-card-actions-row">
            <div class="ccm-criticidade-col">${criticidadeHtml}</div>
            <div class="ccm-action-buttons ${isEditable ? '' : 'is-locked'}" id="actions-${id}">${actionsHtml}${isEditable ? '' : '<span class="ccm-lock-note">Bloqueado para edicao</span>'}</div>
          </div>
        </div>
      </div>`;
  }

  // ───────── Actions ─────────
  function nivelToPrioridade(nivel) {
    if (String(nivel) === '1') return 'BAIXA';
    if (String(nivel) === '2') return 'MEDIA';
    if (String(nivel) === '3') return 'ALTA';
    if (String(nivel) === '4') return 'CRITICA';
    return 'MEDIA';
  }

  async function setPrioridade(id, nivel) {
    const prioridade = nivelToPrioridade(nivel);
    const res = await API.put(`/ccm/prioridade/${id}`, { prioridade });
    if (!res.ok) {
      Toast.error(res.data.erro || 'Erro ao atualizar criticidade.');
      renderQueue();
      return;
    }
    const item = allSafs.find(s => s.id === id);
    if (item) item.prioridade = prioridade;
    Toast.success('Criticidade atualizada.');
  }

  function mostrarAceite(id) {
    const actDiv = document.getElementById('actions-' + id);
    if (!actDiv) return;
    // O CCM escolhe o tipo de nota conforme impacto operacional (YE ou YP)
    actDiv.innerHTML = `
      <div class="ccm-recusa-form">
        <label style="font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:2px;">Tipo de Nota SAP</label>
        <select id="tipo-nota-${id}" style="font-size:.82rem;padding:.25rem .5rem;
                border:1.5px solid var(--primary);border-radius:var(--radius);
                background:var(--bg);color:var(--text);cursor:pointer;">
          <option value="YP" selected>YP – Corretiva Programada (sem impacto)</option>
          <option value="YE">YE – Corretiva Emergencial (impacto operacional)</option>
        </select>
        <button class="btn btn-success btn-sm" onclick="window._ccmAceitar('${id}')">&#10003; Confirmar</button>
        <button class="btn btn-ghost btn-sm" onclick="window._ccmRenderQueue()">Cancelar</button>
      </div>`;
  }

  async function aceitar(id) {
    const user = Auth.getUser();
    const tipoNota = document.getElementById('tipo-nota-' + id)?.value || 'YP';
    const nivelSelecionado = document.querySelector(`input[name="crit-${id}"]:checked`)?.value || '2';
    const prioridade = nivelToPrioridade(nivelSelecionado);
    const actDiv = document.getElementById('actions-' + id);
    if (actDiv) actDiv.innerHTML = `<div class="spinner" style="width:18px;height:18px;"></div>`;

    const res = await API.avaliarSaf(id, { status: 'APROVADA', avaliador_id: user?.id, tipo_nota: tipoNota, prioridade });
    if (!res.ok) {
      Toast.error(res.data.erro || 'Erro ao aceitar a SAF.');
      renderQueue();
      return;
    }
    const item = allSafs.find(s => s.id === id);
    if (item) {
      item.status = 'APROVADA';
      const qmnum = res.data.qmnum;
      if (qmnum) {
        item.saf_integracao_sap = { qmnum, tipo_nota: tipoNota, status_integracao: 'SUCESSO' };
        const nDup = res.data.duplicatas || 0;
        const dupMsg = nDup > 0 ? ` ${nDup} duplicata(s) encerrada(s).` : '';
        Toast.success(`SAF aceita! Nota ${tipoNota} criada no SAP: ${qmnum}.${dupMsg}`);
        // Atualiza duplicatas em memória (mesmo equip + mesmo sintoma)
        if (nDup > 0) {
          allSafs.forEach(s => {
            if (s.id !== id && s.status === 'ABERTA' &&
                s.equipamento_id === item.equipamento_id &&
                s.sintoma_id     === item.sintoma_id) {
              s.status = 'DUPLICADA';
              s.qmnum_duplicata = qmnum;
            }
          });
        }
      } else if (res.data.aviso_sap) {
        item.saf_integracao_sap = { status_integracao: 'ERRO', mensagem_erro: res.data.aviso_sap };
        Toast.warning(`SAF aceita, mas erro no SAP: ${res.data.aviso_sap}`);
      } else {
        item.saf_integracao_sap = { status_integracao: 'PENDENTE' };
        Toast.success(`SAF aceita! Nota ${tipoNota} enviada ao SAP.`);
      }
    }
    updateStats();
    renderQueue();
  }

  function mostrarRecusa(id) {
    const actDiv = document.getElementById('actions-' + id);
    if (!actDiv) return;
    actDiv.innerHTML = `
      <div class="ccm-recusa-form">
        <textarea id="motivo-${id}" placeholder="Motivo da recusa (obrigatório)…"></textarea>
        <button class="btn btn-danger btn-sm" onclick="window._ccmConfirmarRecusa('${id}')">Confirmar</button>
        <button class="btn btn-ghost btn-sm" onclick="window._ccmRenderQueue()">Cancelar</button>
      </div>`;
    document.getElementById('motivo-' + id)?.focus();
  }

  async function confirmarRecusa(id) {
    const motivo = (document.getElementById('motivo-' + id)?.value || '').trim();
    if (!motivo) { Toast.warning('Informe o motivo da recusa.'); return; }

    const user = Auth.getUser();
    const res  = await API.avaliarSaf(id, {
      status: 'DEVOLVIDA',
      motivo_devolucao: motivo,
      avaliador_id: user?.id
    });
    if (!res.ok) {
      Toast.error(res.data.erro || 'Erro ao recusar a SAF.');
      return;
    }
    const item = allSafs.find(s => s.id === id);
    if (item) { item.status = 'DEVOLVIDA'; item.motivo_devolucao = motivo; }
    updateStats();
    renderQueue();
    Toast.success('SAF devolvida ao solicitante.');
  }

  function toggleDuplicadoGroup(equip) {
    const hasOpen = allSafs.some(s => s.status === 'ABERTA' && (s.equipamento || s.titulo_falha || 'Sem Equipamento') === equip);
    if (!hasOpen) {
      Toast.warning('Nao ha ordens abertas para este equipamento.');
      return;
    }

    if (duplicateModeGroups.has(equip)) {
      duplicateModeGroups.delete(equip);
      duplicateSelections.delete(equip);
    } else {
      duplicateModeGroups.add(equip);
    }
    renderQueue();
  }

  function toggleDuplicadaItem(id, equipEncoded, checked) {
    const equip = decodeURIComponent(equipEncoded || '');
    const set = getSelectionSet(equip);
    if (checked) set.add(id);
    else set.delete(id);
    renderQueue();
  }

  async function executarDuplicadasGrupo(equip, idsLote) {
    const user = Auth.getUser();
    const res = await API.duplicarLote(idsLote, user?.id);
    if (!res.ok) {
      Toast.error(res.data.erro || 'Erro ao marcar ordens como duplicadas.');
      return;
    }

    const marcados = new Set((res.data.ids_marcados || []).map(String));
    allSafs.forEach(s => {
      if (marcados.has(String(s.id))) {
        s.status = 'DUPLICADA';
        s.data_avaliacao = new Date().toISOString();
      }
    });

    duplicateSelections.delete(equip);
    duplicateModeGroups.delete(equip);
    updateStats();
    renderQueue();
    Toast.success(`${res.data.total_marcado || marcados.size} ordem(ns) marcadas como duplicadas.`);
  }

  function confirmarDuplicadasGrupo(equip) {
    const selecionados = getSelectionSet(equip);
    const idsLote = allSafs
      .filter(s => s.status === 'ABERTA' && (s.equipamento || s.titulo_falha || 'Sem Equipamento') === equip && selecionados.has(s.id))
      .map(s => s.id);

    if (!idsLote.length) {
      Toast.warning('Selecione ao menos uma ordem para marcar como duplicada.');
      return;
    }

    ConfirmModal.show({
      title: 'Confirmar duplicadas',
      message: `
        <div style="font-size:.9rem;color:var(--text);line-height:1.5;">
          <p style="margin:0 0 .45rem;">Voce esta prestes a marcar <strong>${idsLote.length}</strong> ordem(ns) como <strong>Duplicada</strong>.</p>
          <p style="margin:0;">Deseja continuar?</p>
        </div>`,
      confirmText: 'Sim, marcar duplicadas',
      confirmClass: 'btn-warning',
      onConfirm: () => { executarDuplicadasGrupo(equip, idsLote); },
    });
  }

  async function toggleSap(id, currentVal) {
    const novoValor = !currentVal;
    const res = await API.toggleSap(id, novoValor);
    if (!res.ok) { Toast.error(res.data.erro || 'Erro ao atualizar SAP.'); return; }
    const item = allSafs.find(s => s.id === id);
    if (item) item.atualizado_sap = novoValor;
    renderQueue();
    Toast.success(novoValor ? 'SAP marcado como atualizado.' : 'Flag SAP removida.');
  }

  // Expose for inline onclick handlers
  window._ccmAceitar       = aceitar;
  window._ccmSetPrioridade = setPrioridade;
  window._ccmMostrarAceite  = mostrarAceite;
  window._ccmConfirmarRecusa = confirmarRecusa;
  window._ccmToggleDuplicadaItem = toggleDuplicadaItem;
  window._ccmMostrarRecusa = mostrarRecusa; // compat
  window._ccmToggleSap     = toggleSap;
  window._ccmRenderQueue   = renderQueue;

  // ───────── Lightbox ─────────
  (function () {
    const lb  = document.createElement('div');
    lb.className = 'ccm-lightbox';
    lb.innerHTML = '<button class="ccm-lightbox-close" aria-label="Fechar">&times;</button><img id="ccm-lb-img" src="" alt="Foto ampliada">';
    document.body.appendChild(lb);

    const img = lb.querySelector('#ccm-lb-img');
    lb.querySelector('.ccm-lightbox-close').onclick = () => lb.classList.remove('open');
    lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });

    window._ccmOpenLightbox = function (url) {
      img.src = url;
      lb.classList.add('open');
    };
  })();

  // ───────── Load ─────────
  async function loadQueue(silent = false) {
    if (!silent) {
      document.getElementById('ccm-queue').innerHTML =
        '<div class="spinner-center"><div class="spinner"></div></div>';
    }
    const res = await API.filaCCM();
    if (!res.ok) {
      if (!silent) {
        document.getElementById('ccm-queue').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">&#9888;&#65039;</div>
            <p class="empty-state-title">Erro ao carregar fila</p>
            <p class="empty-state-text">${res.data.erro || 'Tente novamente.'}</p>
          </div>`;
      }
      return;
    }
    allSafs = (res.data || []).map(enrichSafForFilters);
    updateStats();
    syncFilterControls();
    renderQueue();
    // Atualiza indicador de última sincronização
    const el = document.getElementById('last-sync');
    if (el) {
      const now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      el.textContent = `Atualizado às ${now}`;
    }
  }

  // ───────── Bootstrap ─────────
  document.addEventListener('DOMContentLoaded', function () {
    const user = Auth.requireAuth(['CCM']);
    if (!user) return;

    Permissions.requestAll();

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        activeFilter = this.dataset.filter;
        renderQueue();
      });
    });

    document.getElementById('line-filter')?.addEventListener('change', function () {
      activeLine = this.value;
      activeStation = '';
      populateStationFilter();
      renderQueue();
    });

    document.getElementById('station-filter')?.addEventListener('change', function () {
      activeStation = this.value;
      renderQueue();
    });

    document.getElementById('date-from-filter')?.addEventListener('change', function () {
      activeDateFrom = this.value || '';
      renderQueue();
    });

    document.getElementById('date-to-filter')?.addEventListener('change', function () {
      activeDateTo = this.value || '';
      renderQueue();
    });

    document.getElementById('btn-clear-ccm-filters')?.addEventListener('click', function () {
      activeLine = '';
      activeStation = '';
      activeDateFrom = '';
      activeDateTo = '';
      syncFilterControls();
      renderQueue();
    });

    document.getElementById('btn-refresh').addEventListener('click', () => {
      loadQueue(false);
    });

    carregarCatalogoEstacoes().finally(() => {
      loadQueue(false);
    });

    // Polling silencioso a cada 30 segundos
    setInterval(() => loadQueue(true), 30000);
  });
})();
</script>
{% endblock %}
